# Rust Quality Behavior
#
# Provides Rust code quality capabilities:
# - Code quality checking (cargo fmt, clippy, cargo check, stub detection)
# - Automatic checking on file edits (hook)
# - Expert Rust dev agent
#
# Include this behavior to add Rust quality tools to any bundle.

bundle:
  name: behavior-rust-quality
  version: 0.2.0
  description: Rust quality tools - cargo checks, auto-checking hook, and expert agent

# Tools provided by this behavior
tools:
  - module: tool-rust-check
    source: git+https://github.com/microsoft/amplifier-bundle-rust-dev@main#subdirectory=modules/tool-rust-check
    config:
      default_checks:
        - format
        - lint
        - types
        - stubs

# Hooks provided by this behavior
hooks:
  - module: hooks-rust-check
    source: git+https://github.com/microsoft/amplifier-bundle-rust-dev@main#subdirectory=modules/hooks-rust-check
    config:
      enabled: true
      file_patterns:
        - "*.rs"
      report_level: warning
      auto_inject: true
      checks:
        - lint
        - types
        - format

# Agents provided by this behavior
agents:
  include:
    - rust-dev:rust-dev

# NOTE: rust-dev-instructions.md moved to code-intel agent via context sink pattern.
# Loaded only when code-intel is delegated to, not always-on for all Rust sessions.
# Aligns with foundation BUNDLE_GUIDE.md § "Behavior context.include Policy".
