# Rust LSP Behavior
# Configures rust-analyzer as the Rust LSP server.
# This config deep merges with lsp-core's tool-lsp config.

bundle:
  name: behavior-rust-lsp
  version: 0.2.0

# Include lsp-core behavior to get the tool-lsp module with source
includes:
  - bundle: git+https://github.com/microsoft/amplifier-bundle-lsp@main#subdirectory=behaviors/lsp-core.yaml

# Tool configuration - deep merges with core bundle's tool-lsp
# NOTE: No source: declaration - inherited from lsp-core
tools:
  - module: tool-lsp
    config:
      languages:
        rust:
          extensions:
            - .rs
          workspace_markers:
            - Cargo.toml
            - Cargo.lock
            - .git
          server:
            command:
              - rust-analyzer
            install_check:
              - rust-analyzer
              - --version
            install_hint: "Install standalone from https://github.com/rust-lang/rust-analyzer/releases or via rustup: rustup component add rust-analyzer"
            lifecycle: timeout
            idle_timeout: 300
          capabilities:
            diagnostics: true
            rename: true
            codeAction: true
            inlayHints: true
            customRequest: true
            goToImplementation: true
          initialization_options:
            checkOnSave:
              command: clippy
            cargo:
              allFeatures: true
              buildScripts:
                enable: true
              allTargets: true
            procMacro:
              enable: true

# NOTE: rust-lsp.md moved to code-intel agent via context sink pattern.
# Loaded only when code-intel is delegated to, not always-on for all Rust sessions.
# Aligns with foundation BUNDLE_GUIDE.md § "Behavior context.include Policy".

# Rust code intelligence agent
agents:
  include:
    - rust-dev:code-intel
